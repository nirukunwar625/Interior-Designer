<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple Home Designer</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    header {
      background: #2c3e50;
      color: white;
      padding: 15px;
      text-align: center;
    }

    nav {
      background: #34495e;
      padding: 10px;
      text-align: center;
    }

    nav button {
      margin: 5px;
      padding: 10px 15px;
      border: none;
      background: #1abc9c;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }

    nav button:hover {
      background: #16a085;
    }

    section {
      display: none;
      padding: 20px;
    }

    .active {
      display: block;
    }

    /* Designer area */
    #room {
      width: 400px;
      height: 300px;
      border: 2px solid #333;
      margin: 20px auto;
      position: relative;
      background: #ecf0f1;
    }

    .furniture {
      width: 60px;
      height: 60px;
      position: absolute;
      cursor: move;
      border-radius: 8px;
    }

    .sofa { background: #e74c3c; top: 20px; left: 20px; }
    .table { background: #8e44ad; top: 100px; left: 120px; }
    .bed { background: #3498db; top: 180px; left: 50px; }

    footer {
      background: #2c3e50;
      color: white;
      text-align: center;
      padding: 10px;
      position: fixed;
      bottom: 0;
      width: 100%;
    }
  </style>
</head>
<body>

<header>
  <h1>🏠 Simple Home Designer</h1>
</header>

<nav>
  <button onclick="showPage('home')">Home</button>
  <button onclick="showPage('design')">Design Room</button>
  <button onclick="showPage('about')">About</button>
</nav>

<section id="home" class="active">
  <h2>Welcome</h2>
  <p>Design your dream home layout easily. Move furniture and change room colors!</p>
</section>

<section id="design">
  <h2>Room Designer</h2>

  <label>Choose Wall Color:</label>
  <input type="color" onchange="changeColor(this.value)">

  <div id="room">
    <div class="furniture sofa" draggable="true"></div>
    <div class="furniture table" draggable="true"></div>
    <div class="furniture bed" draggable="true"></div>
  </div>

  <p>Drag furniture inside the room.</p>
</section>

<section id="about">
  <h2>About</h2>
  <p>This is a simple home designer demo built with HTML, CSS, and JavaScript.</p>
</section>

<footer>
  <p>© 2026 Simple Home Designer</p>
</footer>

<script>
  function showPage(pageId) {
    document.querySelectorAll("section").forEach(sec => sec.classList.remove("active"));
    document.getElementById(pageId).classList.add("active");
  }

  function changeColor(color) {
    document.getElementById("room").style.background = color;
  }

  // Drag functionality
  let dragged = null;

  document.querySelectorAll(".furniture").forEach(el => {
    el.addEventListener("dragstart", function(e) {
      dragged = el;
    });
  });

  document.getElementById("room").addEventListener("dragover", function(e) {
    e.preventDefault();
  });

  document.getElementById("room").addEventListener("drop", function(e) {
    e.preventDefault();
    if (dragged) {
      const rect = this.getBoundingClientRect();
      dragged.style.left = (e.clientX - rect.left - 30) + "px";
      dragged.style.top = (e.clientY - rect.top - 30) + "px";
    }
  });
</script>

</body>
</html>
